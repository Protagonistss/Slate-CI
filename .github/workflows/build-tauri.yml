name: Build Tauri

on:
  workflow_call:
    inputs:
      ref:
        description: Slate 分支或 tag
        type: string
        required: true
      ref_slug:
        description: 用于 artifact 命名的 ref 安全字符串
        type: string
        required: true
      platform:
        description: 目标平台 (windows | macos | linux)
        type: string
        required: true
      runner:
        description: GitHub Actions runner 标签
        type: string
        required: true
      slate_repo:
        description: Slate 私有库坐标 (owner/repo)
        type: string
        required: true
      node_version:
        description: Node.js 版本
        type: string
        required: false
        default: '24.9.0'
    secrets:
      repo_token:
        description: 访问私有库的 PAT
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout private Slate
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.slate_repo }}
          token: ${{ secrets.repo_token }}
          ref: ${{ inputs.ref }}

      - name: Install Linux system dependencies
        if: inputs.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: native
          shared-key: ${{ inputs.platform == 'macos' && 'macos-dual-arch' || inputs.platform }}

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        shell: bash
        run: pnpm run generate-icons

      - name: Generate installer assets
        shell: bash
        run: pnpm run generate-installer-assets

      - name: Build Tauri (Windows)
        if: inputs.platform == 'windows'
        shell: bash
        run: pnpm run tauri:build

      - name: Build Tauri (macOS — Intel + Apple Silicon)
        if: inputs.platform == 'macos'
        shell: bash
        run: |
          pnpm run tauri:build -- --target x86_64-apple-darwin
          pnpm run tauri:build -- --target aarch64-apple-darwin

      - name: Verify macOS binaries
        if: inputs.platform == 'macos'
        shell: bash
        run: |
          X64_BIN="native/target/x86_64-apple-darwin/release/bundle/macos/Slate.app/Contents/MacOS/slate"
          ARM_BIN="native/target/aarch64-apple-darwin/release/bundle/macos/Slate.app/Contents/MacOS/slate"
          for bin in "$X64_BIN" "$ARM_BIN"; do
            if [ ! -f "$bin" ]; then
              echo "Expected app binary not found: $bin"
              exit 1
            fi
          done
          file "$X64_BIN" | grep -q 'x86_64' || { echo "Intel binary missing x86_64 arch"; exit 1; }
          file "$ARM_BIN" | grep -q 'arm64' || { echo "Apple Silicon binary missing arm64 arch"; exit 1; }

      - name: Build Tauri (Linux — deb + AppImage only)
        if: inputs.platform == 'linux'
        shell: bash
        run: pnpm run tauri:build --bundles deb --bundles appimage

      - name: Resolve bundle upload path
        id: bundle
        shell: bash
        run: |
          if [ "${{ inputs.platform }}" = "macos" ]; then
            {
              echo "paths<<EOF"
              echo "native/target/x86_64-apple-darwin/release/bundle/**"
              echo "native/target/aarch64-apple-darwin/release/bundle/**"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "paths=native/target/release/bundle/**" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: slate-editor-bundle-${{ inputs.platform }}-${{ inputs.ref_slug }}
          path: ${{ steps.bundle.outputs.paths }}
          if-no-files-found: error
