name: build-slate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 私有库分支或 tag（需含 pnpm-lock.yaml，当前为 dev）
        required: false
        default: dev
      release_tag:
        description: 发布版本 tag（如 v0.0.3，留空则仅上传 Artifacts）
        required: false
        default: ''
      prerelease:
        description: 是否为预发布
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [build-slate]

permissions:
  contents: read

env:
  SLATE_PRIVATE_REPO: ${{ vars.SLATE_PRIVATE_REPO || 'AISlate/Slate' }}
  NODE_VERSION: '24.9.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      ref_slug: ${{ steps.meta.outputs.ref_slug }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve ref and release options
        id: meta
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          SLATE_REPO: ${{ env.SLATE_PRIVATE_REPO }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          CLIENT_REF: ${{ github.event.client_payload.ref }}
          CLIENT_RELEASE_TAG: ${{ github.event.client_payload.release_tag }}
          CLIENT_PRERELEASE: ${{ github.event.client_payload.prerelease }}
        run: bash .github/scripts/resolve-build-meta.sh

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows
          - runner: macos-latest
            platform: macos
          - runner: ubuntu-22.04
            platform: linux
    uses: ./.github/workflows/build-tauri.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      ref_slug: ${{ needs.prepare.outputs.ref_slug }}
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      slate_repo: ${{ vars.SLATE_PRIVATE_REPO || 'AISlate/Slate' }}
      node_version: '24.9.0'
    secrets:
      repo_token: ${{ secrets.SLATE_REPO_PAT }}
      tauri_signing_private_key: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      tauri_signing_private_key_password: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slate-editor-bundle-*
          merge-multiple: true
          path: bundles

      - name: Prepare release assets
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: bash .github/scripts/prepare-release-assets.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Slate ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*

      - name: Remove auto-generated source archives
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/remove-source-archives.sh
