name: build-slate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 私有库分支或 tag（需含 pnpm-lock.yaml，当前为 dev）
        required: false
        default: dev
      release_tag:
        description: 发布版本 tag（如 v0.0.3，留空则仅上传 Artifacts）
        required: false
        default: ''
      prerelease:
        description: 是否为预发布
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [build-slate]

permissions:
  contents: read

env:
  SLATE_PRIVATE_REPO: ${{ vars.SLATE_PRIVATE_REPO || 'AISlate/Slate' }}
  NODE_VERSION: '24.9.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      ref_slug: ${{ steps.meta.outputs.ref_slug }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve ref and release options
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.ref }}"
            RELEASE_TAG="${{ github.event.client_payload.release_tag }}"
            PRERELEASE="${{ github.event.client_payload.prerelease }}"
          else
            REF="${{ inputs.ref }}"
            RELEASE_TAG="${{ inputs.release_tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          fi
          [ -z "$REF" ] && REF="dev"
          [ -z "$PRERELEASE" ] && PRERELEASE="false"

          REF_SLUG="$REF"
          REF_SLUG="${REF_SLUG//\//-}"
          REF_SLUG="${REF_SLUG//\\/-}"
          REF_SLUG="${REF_SLUG//:/-}"
          REF_SLUG="${REF_SLUG//\"/-}"
          REF_SLUG="${REF_SLUG//</-}"
          REF_SLUG="${REF_SLUG//>/-}"
          REF_SLUG="${REF_SLUG//|/-}"
          REF_SLUG="${REF_SLUG//\*/-}"
          REF_SLUG="${REF_SLUG//\?/-}"
          while [ "${REF_SLUG#*--}" != "$REF_SLUG" ]; do REF_SLUG="${REF_SLUG//--/-}"; done
          REF_SLUG="${REF_SLUG#-}"
          REF_SLUG="${REF_SLUG%-}"

          VERSION="${RELEASE_TAG#v}"

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "ref_slug=$REF_SLUG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Building ${REF} from ${{ env.SLATE_PRIVATE_REPO }}"
          [ -n "$RELEASE_TAG" ] && echo "Will publish release: ${RELEASE_TAG}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout private Slate
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SLATE_PRIVATE_REPO }}
          token: ${{ secrets.SLATE_REPO_PAT }}
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm run generate-icons

      - name: Generate installer assets
        run: pnpm run generate-installer-assets

      - name: Build Tauri (Windows / macOS)
        if: matrix.platform != 'linux'
        run: pnpm run tauri:build

      - name: Build Tauri (Linux — deb + AppImage only)
        if: matrix.platform == 'linux'
        run: pnpm run tauri:build -- --bundles deb,appimage

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: slate-editor-bundle-${{ matrix.platform }}-${{ needs.prepare.outputs.ref_slug }}
          path: native/target/release/bundle/**
          if-no-files-found: error

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: slate-editor-bundle-*
          merge-multiple: true
          path: bundles

      - name: Prepare release assets
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p release-assets

          # macOS DMG
          find bundles -type f -iname '*.dmg' -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" "release-assets/Slate-${VERSION}.dmg"
              done

          # Windows NSIS installer
          find bundles -type f -path '*/nsis/*' -iname '*.exe' -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" "release-assets/Slate-${VERSION}-setup.exe"
              done

          # Linux .deb
          find bundles -type f -iname '*.deb' -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" "release-assets/Slate-${VERSION}-amd64.deb"
              done

          # Linux AppImage
          find bundles -type f -iname '*.AppImage' -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" "release-assets/Slate-${VERSION}-x86_64.AppImage"
              done

          echo "Release assets:"
          ls -la release-assets/
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No release assets found in artifacts"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Slate ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*

      # GitHub 会自动附加 Source code (zip/tar.gz)，本仓库无应用源码，发布后删除
      - name: Remove auto-generated source archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.release_tag }}"
          gh release view "$TAG" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | startswith("Source code")) | .id' \
            | while read -r asset_id; do
                if [ -n "$asset_id" ]; then
                  echo "Deleting release asset ${asset_id}"
                  gh api --method DELETE \
                    "/repos/${{ github.repository }}/releases/assets/${asset_id}"
                fi
              done
