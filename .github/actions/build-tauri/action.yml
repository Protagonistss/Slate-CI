name: Build Tauri
description: Checkout Slate 私有库，安装依赖并构建 Tauri 安装包

inputs:
  ref:
    description: Slate 分支或 tag
    required: true
  platform:
    description: 目标平台 (windows | macos | linux)
    required: true
  slate-repo:
    description: Slate 私有库坐标 (owner/repo)
    required: true
  repo-token:
    description: 访问私有库的 PAT
    required: true
  node-version:
    description: Node.js 版本
    required: false
    default: '24.9.0'

runs:
  using: composite
  steps:
    - name: Checkout private Slate
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.slate-repo }}
        token: ${{ inputs.repo-token }}
        ref: ${{ inputs.ref }}

    - name: Install Linux system dependencies
      if: ${{ inputs.platform == 'linux' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          libssl-dev \
          libgtk-3-dev \
          libglib2.0-dev

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: native

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Generate icons
      shell: bash
      run: pnpm run generate-icons

    - name: Generate installer assets
      shell: bash
      run: pnpm run generate-installer-assets

    - name: Install macOS universal Rust targets
      if: ${{ inputs.platform == 'macos' }}
      shell: bash
      run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

    - name: Build Tauri (Windows)
      if: ${{ inputs.platform == 'windows' }}
      shell: bash
      run: pnpm run tauri:build

    - name: Build Tauri (macOS — universal DMG)
      if: ${{ inputs.platform == 'macos' }}
      shell: bash
      run: pnpm run tauri:build -- --target universal-apple-darwin

    - name: Verify macOS universal binary
      if: ${{ inputs.platform == 'macos' }}
      shell: bash
      run: |
        APP_BIN="native/target/universal-apple-darwin/release/bundle/macos/Slate.app/Contents/MacOS/slate"
        if [ ! -f "$APP_BIN" ]; then
          echo "Expected universal app binary not found: $APP_BIN"
          exit 1
        fi
        lipo -info "$APP_BIN"
        lipo -info "$APP_BIN" | grep -q 'x86_64' || { echo "Missing x86_64 slice"; exit 1; }
        lipo -info "$APP_BIN" | grep -q 'arm64' || { echo "Missing arm64 slice"; exit 1; }

    - name: Build Tauri (Linux — deb + AppImage only)
      if: ${{ inputs.platform == 'linux' }}
      shell: bash
      run: pnpm run tauri:build --bundles deb --bundles appimage
